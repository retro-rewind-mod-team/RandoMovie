name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            arch: amd64
            ext: ""
          - os: windows-latest
            target: windows
            arch: amd64
            ext: ".exe"
          - os: macos-latest
            target: darwin
            arch: amd64
            ext: ".app"
          - os: macos-latest
            target: darwin
            arch: arm64
            ext: ".app"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install Fyne dependencies (Linux)
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev

      - name: Install fyne tool
        run: go install fyne.io/fyne/v2/cmd/fyne@latest

      - name: Build
        run: fyne package -os ${{ matrix.target }} -release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RandoMovie-${{ matrix.target }}-${{ matrix.arch }}
          path: |
            RandoMovie${{ matrix.ext }}
            RandoMovie

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
