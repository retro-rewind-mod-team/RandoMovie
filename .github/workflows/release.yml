name: Release

on:
  push:
    tags: ['v*']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            arch: amd64
            artifact: RandoMovie-linux-amd64
          - os: windows-latest
            target: windows
            arch: amd64
            artifact: RandoMovie-windows-amd64
          - os: macos-15-intel
            target: darwin
            arch: amd64
            artifact: RandoMovie-macos-intel
          - os: macos-latest
            target: darwin
            arch: arm64
            artifact: RandoMovie-macos-apple-silicon

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        working-directory: ./RandoMovie

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: RandoMovie/go.sum

      - name: Install Fyne dependencies (Linux)
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc pkg-config libgl1-mesa-dev xorg-dev libxkbcommon-dev

      - name: Install fyne CLI
        run: go install fyne.io/tools/cmd/fyne@latest

      - name: Build
        env:
          CGO_ENABLED: 1
        run: fyne package -os ${{ matrix.target }}

      - name: Prepare release asset
        shell: bash
        run: |
          if [ "${{ matrix.target }}" = "darwin" ]; then
            zip -r "${{ matrix.artifact }}.zip" RandoMovie.app
          elif [ "${{ matrix.target }}" = "windows" ]; then
            mv RandoMovie.exe "${{ matrix.artifact }}.exe"
          elif [ "${{ matrix.target }}" = "linux" ]; then
            mv RandoMovie.tar.xz "${{ matrix.artifact }}.tar.xz"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: RandoMovie/${{ matrix.artifact }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
